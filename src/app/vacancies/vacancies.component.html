<div class="vacancies-page">
  <div class="vacancies-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="page-title">ვაკანსიები</h1>
        <p class="page-subtitle">აქტუალური ვაკანსიები და კონკურსები</p>
      </div>

      <nav class="filter-nav">
        <!-- All vacancies -->
        <button
          class="filter-item"
          [class.active]="selectedCategory === 'ყველა'"
          (click)="selectedCategory = 'ყველა'">
          <span class="filter-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </span>
          <span class="filter-label">ყველა ვაკანსია</span>
          <span class="filter-count">{{ getCount('ყველა') }}</span>
        </button>

        <!-- სააპლიკაციო ფორმა -->
        <button
          class="filter-item"
          [class.active]="selectedCategory === 'სააპლიკაციო ფორმა'"
          (click)="selectedCategory = 'სააპლიკაციო ფორმა'">
          <span class="filter-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
              <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
              <path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>
            </svg>
          </span>
          <span class="filter-label">სააპლიკაციო ფორმა</span>
          <span class="filter-count">{{ getCount('სააპლიკაციო ფორმა') }}</span>
        </button>

        <!-- ღია საჯარო კონკურსი -->
        <button
          class="filter-item"
          [class.active]="selectedCategory === 'ღია საჯარო კონკურსი'"
          (click)="selectedCategory = 'ღია საჯარო კონკურსი'">
          <span class="filter-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </span>
          <span class="filter-label">ღია საჯარო კონკურსი</span>
          <span class="filter-count">{{ getCount('ღია საჯარო კონკურსი') }}</span>
        </button>

        <!-- შიდა კონკურსი -->
        <button
          class="filter-item"
          [class.active]="selectedCategory === 'შიდა კონკურსი'"
          (click)="selectedCategory = 'შიდა კონკურსი'">
          <span class="filter-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>
          <span class="filter-label">შიდა კონკურსი</span>
          <span class="filter-count">{{ getCount('შიდა კონკურსი') }}</span>
        </button>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="vacancies-main">
      <div class="vacancy-list">
        <div class="vacancy-card" *ngFor="let vacancy of filteredVacancies">
          <div class="card-meta">
            <span class="category-tag" [ngClass]="getCategoryClass(vacancy.category)">
              {{ vacancy.category }}
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
                <line x1="16" x2="16" y1="2" y2="6"/>
                <line x1="8" x2="8" y1="2" y2="6"/>
                <line x1="3" x2="21" y1="10" y2="10"/>
              </svg>
              შექმნილია: {{ formatDate(vacancy.createdAt) }}
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/>
                <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
                <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 0-2 2h-2"/>
                <path d="M10 6h4"/><path d="M10 10h4"/>
                <path d="M10 14h4"/><path d="M10 18h4"/>
              </svg>
              {{ vacancy.department }}
            </span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              {{ vacancy.location }}
            </span>
          </div>

          <h2 class="vacancy-title">{{ vacancy.title }}</h2>
          <p class="vacancy-description">{{ vacancy.description }}</p>

          <a href="#" class="read-more" (click)="$event.preventDefault()">
            სრულად ნახვა
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
          </a>
        </div>

        <div class="loading-state" *ngIf="isLoading">
          <div class="loading-spinner"></div>
          <p>ვაკანსიები იტვირთება...</p>
        </div>

        <div class="empty-state" *ngIf="!isLoading && filteredVacancies.length === 0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <p>ამ კატეგორიაში ვაკანსიები არ არის</p>
        </div>
      </div>
    </main>

  </div>
</div>
