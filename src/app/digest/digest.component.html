<div class="digest-container">
  <div class="digest-header">
    <div class="digest-header-row">
      <button class="back-btn" type="button" routerLink="/news" aria-label="დაბრუნება">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>

      <div class="digest-title-block">
        <h1 class="digest-title">დაიჯესტი</h1>
        <p class="digest-subtitle">მოკლე მიმოხილვა მიმდინარე ამბებზე</p>
      </div>

      <div class="digest-pill" *ngIf="periodText">
        <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
          <path d="M16 2v4" />
          <path d="M8 2v4" />
          <path d="M3 10h18" />
        </svg>
        <span>{{ periodText }}</span>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="digest-empty" *ngIf="!featuredEntries.length && !listEntries.length">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <p>ამჟამად აქტიური დაიჯესტის ჩანაწერები არ არის</p>
  </div>

  <div class="digest-grid" *ngIf="featuredEntries.length || listEntries.length">
    <!-- Featured circles -->
    <div class="digest-circles" *ngIf="featuredEntries.length">
      <a
        class="digest-circle"
        *ngFor="let item of featuredEntries; let i = index"
        [href]="item.sourceUrl || null"
        [target]="item.sourceUrl ? '_blank' : null"
        [style.textDecoration]="'none'">
        <div class="circle-img" [style.background]="getCircleBackground(i, item)"></div>
        <div class="circle-text">
          <div class="circle-title">{{ item.title }}</div>
          <div class="circle-desc" *ngIf="item.description">{{ item.description }}</div>
        </div>
      </a>
    </div>

    <!-- Divider between circles and list -->
    <div class="digest-section-divider" *ngIf="featuredEntries.length && listEntries.length">
      <span>სხვა ჩანაწერები</span>
    </div>

    <!-- List entries (non-featured) -->
    <div class="digest-list" *ngIf="listEntries.length">
      <a
        class="digest-feature-card"
        *ngFor="let entry of listEntries; let i = index"
        [href]="entry.sourceUrl || null"
        [target]="entry.sourceUrl ? '_blank' : null"
        [class.clickable]="!!entry.sourceUrl">
        <div class="feature-image" [style.background]="getFeatureBackground(i, entry)" aria-hidden="true"></div>
        <div class="feature-content">
          <div class="feature-title">{{ entry.title }}</div>
          <div class="feature-desc">{{ entry.description }}</div>
          <div class="feature-source" *ngIf="entry.sourceName">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            {{ entry.sourceName }}
          </div>
        </div>
        <div class="feature-arrow" *ngIf="entry.sourceUrl" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </div>
      </a>
    </div>
  </div>
</div>
